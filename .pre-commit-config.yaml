# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
        exclude: '^client/.*tsconfig.*\.json$'
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Project-local linting and formatting commands
  - repo: local
    hooks:
      - id: ruff-check
        name: uv run ruff check
        entry: uv run --project . --group dev ruff check
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: uv run ruff format
        entry: uv run --project . --group dev ruff format
        language: system
        types_or: [python, pyi]
      - id: client-lint
        name: npm run lint
        entry: npm --prefix client run lint
        language: system
        pass_filenames: false
        files: '^client/.*\.(js|jsx|ts|tsx)$'
