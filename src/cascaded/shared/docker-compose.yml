name: cascaded-shared

services:
  nvidia-llm:
    profiles: ["generic-workstation", "agentic-airline-workstation"]
    image: ${NVIDIA_LLM_IMAGE:-nvcr.io/nim/nvidia/nemotron-3-nano:1.7.0-variant}
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=8000
    ports:
      - "18000:8000"
    volumes:
      - llm_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health/ready\").read()' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 1800s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  nvidia-llm-vllm:
    profiles: ["generic-dgxspark", "generic-jetson"]
    container_name: nvidia-llm-vllm
    runtime: nvidia
    image: nvcr.io/nvidia/vllm:25.12.post1-py3
    pull_policy: if_not_present
    ipc: host
    shm_size: 16GB
    cpuset: ${VLLM_CPUSET:-}
    env_file:
      - ../../../.env
    environment:
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - VLLM_FLASHINFER_MOE_BACKEND=throughput
      - FLASHINFER_DISABLE_VERSION_CHECK=1
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_LOG_DIRECTORY=/tmp/nvidia-log
      - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${VLLM_MPS_THREAD_PCT:-100}
    ports:
      - "18000:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - llm_cache:/root/.cache/vllm
      - /tmp/nvidia-mps:/tmp/nvidia-mps
      - /tmp/nvidia-log:/tmp/nvidia-log
    ulimits:
      nofile: 2048
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        (sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null) || true && \
        pip install --no-cache-dir "flashinfer-jit-cache==0.6.0+cu130" \
          --index-url https://flashinfer.ai/whl/cu130 && \
        vllm serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4 \
          --host 0.0.0.0 \
          --port 8000 \
          --max-model-len 4096 \
          --gpu-memory-utilization 0.35 \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --async-scheduling \
          --kv-cache-dtype fp8
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 1200s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  asr-service:
    profiles: ["generic-dgxspark", "generic-workstation", "agentic-airline-workstation"]
    image: ${ASR_DOCKER_IMAGE:-nvcr.io/nim/nvidia/nemotron-asr-streaming:1.0.0}
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9001
      - NIM_GRPC_API_PORT=50052
      - NIM_TAGS_SELECTOR=${ASR_NIM_TAGS:-mode=str}
    ports:
      - "50152:50052"
      - "9001:9001"
    volumes:
      - asr_cache:/opt/nim/.cache
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:9001/v1/health/ready\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ready\" or data.get(\"ready\") is True else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 2400s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  tts-service:
    profiles: ["generic-dgxspark", "generic-workstation", "agentic-airline-workstation"]
    image: ${TTS_DOCKER_IMAGE:-nvcr.io/nim/nvidia/magpie-tts-multilingual:1.8.0}
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
      - NIM_TAGS_SELECTOR=${TTS_NIM_TAGS:-name=magpie-tts-multilingual,batch_size=8}
    ports:
      - "50151:50051"
      - "9000:9000"
    volumes:
      - tts_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:9000/v1/health/ready\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ready\" or data.get(\"ready\") is True else 1)'"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 3000s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  nemotron-speech:
    profiles: ["generic-jetson"]
    container_name: nemotron-speech
    image: nvcr.io/nvidia/riva/riva-speech:2.24.0-l4t-aarch64
    runtime: nvidia
    ipc: host
    cpuset: ${RIVA_CPUSET:-}
    environment:
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_LOG_DIRECTORY=/tmp/nvidia-log
      - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${RIVA_MPS_THREAD_PCT:-100}
    volumes:
      - ${RIVA_MODEL_LOC:-/tmp/riva-model-repo-not-configured}:/data
      - /tmp/nvidia-mps:/tmp/nvidia-mps
      - /tmp/nvidia-log:/tmp/nvidia-log
    ports:
      - "50051:50051"
    ulimits:
      memlock: -1
    command:
      - start-riva
      - --riva-uri=0.0.0.0:50051
      - --asr_service=true
      - --tts_service=true
      - --nlp_service=false
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  asr_cache:
  tts_cache:
  llm_cache:
