# On-prem service catalog for the Thinker/Talker cascaded example.

workstation:
  llm:
    nemotron-nano:
      name: "Nemotron 3 Nano 30B A3B"
      model_id: "nvidia/nemotron-3-nano"
      base_url: "http://nvidia-llm:8000/v1"
      system_prompt: ""
      max_tokens: 2048
      extra_params: '{"extra_body":{"chat_template_kwargs":{"enable_thinking":false}}}'
  thinker-llm:
    nemotron-nano:
      name: "Nemotron 3 Nano 30B A3B Thinker"
      model_id: "nvidia/nemotron-3-nano"
      base_url: "http://nvidia-llm:8000/v1"
      max_tokens: 4096
      extra_params: '{"extra_body":{"chat_template_kwargs":{"enable_thinking":true,"thinking_budget":1024}}}'
  booking-server:
    default:
      name: "Booking Server"
      server: "http://booking-server:8001"
  tts:
    magpie-tts:
      name: "Magpie TTS"
      server: "tts-service:50051"
      voice_id: "Magpie-Multilingual.EN-US.Aria"
      function_id: ""
  asr:
    nemotron-speech:
      name: "Nemotron Speech Streaming En 0.6B"
      server: "asr-service:50052"
      model: "nemotron-speech-streaming-en-0.6b-asr"
      function_id: ""
    parakeet-ctc:
      name: "Parakeet CTC 1.1B"
      server: "asr-service:50052"
      model: "parakeet-ctc-1.1b-asr"
      function_id: ""

