# On-prem catalog — used when `DEPLOYMENT_PLATFORM` is set explicitly to
# `workstation`.
#
# Jetson and DGX Spark are not supported for the Agentic Airline use case.
#
# Keep platform-specific built-ins grouped under the platform name so the UI
# only shows services for the active deployment.
# Store Compose/container-reachable built-ins here. When the backend runs
# directly on the host, it rewrites these endpoints to `localhost`.

workstation:
  llm:
    nemotron-nano:
      name: "Nemotron 3 Nano Workstation"
      model_id: "nvidia/nemotron-3-nano"
      base_url: "http://nvidia-llm:8000/v1"
      system_prompt: ""
      extra_params: '{"extra_body":{"chat_template_kwargs":{"enable_thinking":false}}}'
  tts:
    magpie-tts:
      name: "Magpie TTS"
      server: "tts-service:50051"
      voice_id: "Magpie-Multilingual.EN-US.Aria"
      function_id: ""
  asr:
    nemotron-speech:
      name: "Nemotron Speech Streaming En 0.6B"
      server: "asr-service:50052"
      model: "nemotron-speech-streaming-en-0.6b-asr"
      function_id: ""
    parakeet-ctc:
      name: "Parakeet CTC 1.1B"
      server: "asr-service:50052"
      model: "parakeet-ctc-1.1b-asr"
      function_id: ""
