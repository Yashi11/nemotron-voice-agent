name: cascaded-agentic-airline

# Example-specific sidecar(s) for the Agentic Airline example. Gated by the
# ``cascaded/agentic-airline`` per-example compose profile so a Generic-only
# deployment does not spin up the booking server. The profile name matches the
# registry example key verbatim.
#
#   docker compose --profile cascaded/agentic-airline up
#
# Combine with hardware profiles as needed, e.g.
# ``--profile cascaded/agentic-airline --profile workstation``.

services:
  booking-server:
    profiles: ["cascaded/agentic-airline"]
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: nemotron-voice-agent:latest
    command: ["uv", "run", "python", "-m", "cascaded.agentic_airline.booking_server.server"]
    environment:
      APP_RUNTIME: container
      PYTHONPATH: /app/src
      BOOKING_HOST: "0.0.0.0"
      BOOKING_PORT: "8001"
      BOOKING_DB_PATH: "/app/data/bookings.db"
    ports:
      - "${BOOKING_SERVER_PORT:-8001}:8001"
    volumes:
      - booking_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  booking_data:
