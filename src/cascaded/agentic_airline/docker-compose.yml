name: cascaded-agentic-airline

# Example-specific sidecar(s) for the Agentic Airline example. The booking
# server is needed for every Agentic Airline deployment recipe (cloud and
# on-prem), so it is gated by both the cloud and the workstation recipe
# profiles.
#
#   docker compose --profile cascaded/agentic-airline up                 # cloud
#   docker compose --profile cascaded/agentic-airline/workstation up     # local NIM

services:
  booking-server:
    profiles:
      - cascaded/agentic-airline
      - cascaded/agentic-airline/workstation
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: nemotron-voice-agent:latest
    command: ["uv", "run", "python", "-m", "cascaded.agentic_airline.booking_server.server"]
    environment:
      APP_RUNTIME: container
      PYTHONPATH: /app/src
      BOOKING_HOST: "0.0.0.0"
      BOOKING_PORT: "8001"
      BOOKING_DB_PATH: "/app/data/bookings.db"
    ports:
      - "${BOOKING_SERVER_PORT:-8001}:8001"
    volumes:
      - booking_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  booking_data:
