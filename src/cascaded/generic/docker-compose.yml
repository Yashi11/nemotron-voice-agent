name: cascaded-generic

services:
  generic-example:
    profiles: ["generic", "generic-jetson", "generic-dgxspark", "generic-workstation"]
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: nemotron-voice-agent:latest
    cpuset: ${PIPECAT_CPUSET:-}
    command: ["uv", "run", "python", "src/server.py", "--host", "0.0.0.0", "--bot", "cascaded.generic.pipeline:bot"]
    ports:
      - "7860:7860"
    env_file:
      - ../../../.env
    environment:
      APP_RUNTIME: container
    volumes:
      - .:/app/src/cascaded/generic:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost:7860/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
