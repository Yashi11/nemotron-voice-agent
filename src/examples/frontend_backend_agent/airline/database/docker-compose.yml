# Booking server sidecar used by the Frontend/Backend Agent airline example.
#
#   docker compose --profile frontend-backend-agent up
#   docker compose --profile frontend-backend-agent/workstation up

services:
  booking-server:
    profiles:
      - frontend-backend-agent
      - frontend-backend-agent/workstation
    build:
      context: ../../../../..
      dockerfile: docker/Dockerfile
    image: nemotron-voice-agent:latest
    command: ["uv", "run", "python", "-m", "examples.frontend_backend_agent.airline.database.server"]
    environment:
      APP_RUNTIME: container
      PYTHONPATH: /app/src
      BOOKING_HOST: "0.0.0.0"
      BOOKING_PORT: "8001"
      BOOKING_DB_PATH: "/app/data/bookings.db"
    ports:
      - "${BOOKING_SERVER_PORT:-8001}:8001"
    volumes:
      - booking_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  booking_data:
