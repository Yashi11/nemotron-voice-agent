# Cloud service catalog for the Thinker/Talker cascaded example.

llm:
  nemotron-nano:
    name: "Nemotron 3 Nano 30B A3B"
    model_id: "nvidia/nemotron-3-nano-30b-a3b"
    base_url: "https://integrate.api.nvidia.com/v1"
    system_prompt: ""
    max_tokens: 2048
    extra_params: '{"extra_body":{"chat_template_kwargs":{"enable_thinking":false},"repetition_penalty":1.05}}'

thinker-llm:
  nemotron-nano:
    name: "Nemotron 3 Nano 30B A3B Thinker"
    model_id: "nvidia/nemotron-3-nano-30b-a3b"
    base_url: "https://integrate.api.nvidia.com/v1"
    max_tokens: 4096
    extra_params: '{"extra_body":{"chat_template_kwargs":{"enable_thinking":true,"thinking_budget":1024},"repetition_penalty":1.05}}'

booking-server:
  default:
    name: "Booking Server"
    server: "http://booking-server:8001"

tts:
  magpie-tts:
    name: "Magpie TTS Multilingual"
    server: "grpc.nvcf.nvidia.com:443"
    voice_id: "Magpie-Multilingual.EN-US.Aria"
    function_id: ""

asr:
  nemotron-asr-streaming-english:
    name: "Nemotron ASR Streaming English"
    server: "grpc.nvcf.nvidia.com:443"
    model: "nemotron-asr-streaming"
    function_id: "bb0837de-8c7b-481f-9ec8-ef5663e9c1fa"

  parakeet-ctc:
    name: "Parakeet CTC 1.1B"
    server: "grpc.nvcf.nvidia.com:443"
    model: "parakeet-ctc-1.1b-asr"
    function_id: "d8dd4e9b-fbf5-4fb0-9dba-8cf436c8d965"
