variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_DEPTH: 0

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - lint
  - test
  - build
  - build-sonar
  - sonarqube-vulnerability-report

# Install dependencies
.install_uv_template: &install_uv
  before_script:
    - uv --version
    - uv sync --dev

# Docker login to NVIDIA Container Registry
.docker_login_template: &docker_login
  before_script:
    - docker --version
    - echo "$NGC_API_KEY" | docker login nvcr.io -u '$oauthtoken' --password-stdin

format-check:
  stage: lint
  tags:
    - shell
  <<: *install_uv
  script:
    - uv run ruff format --check .
  allow_failure: false

lint-check:
  stage: lint
  tags:
    - shell
  <<: *install_uv
  script:
    - uv run ruff check .
  allow_failure: false

build-python-app:
  stage: build
  tags:
    - shell
  <<: *docker_login
  variables:
    IMAGE_NAME: nemotron-voice-agent/python-app
    IMAGE_TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest -f Dockerfile .

build-ui:
  stage: build
  tags:
    - shell
  <<: *docker_login
  variables:
    IMAGE_NAME: nemotron-voice-agent/ui
    IMAGE_TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest -f frontend/Dockerfile .

build-sonar:
  stage: build-sonar
  tags:
    - shell

  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/

  script:
    - docker run --rm -v "$CI_PROJECT_DIR:/usr/src" -v "${SONAR_USER_HOME}:/root/.sonar" -w /usr/src -e SONAR_HOST_URL="${SONAR_HOST_URL}" -e SONAR_TOKEN="${SONAR_TOKEN}" sonarsource/sonar-scanner-cli:11 sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'

sonarqube-vulnerability-report:
  stage: sonarqube-vulnerability-report
  tags:
    - shell
  script:
    - 'curl -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/issues/gitlab_sast_export?projectKey=SW-Cloud_NEMOTRON-VOICE-AGENT_NEMOTRON-VOICE-AGENT_nemotron-voice-agent&branch=${CI_COMMIT_BRANCH}&pullRequest=${CI_MERGE_REQUEST_IID}" -o gl-sast-sonar-report.json'
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'
  artifacts:
    expire_in: 1 day
    reports:
      sast: gl-sast-sonar-report.json
