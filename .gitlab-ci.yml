variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: 0
  GIT_CLEAN_FLAGS: "-ffdx -e client/node_modules/"
  UV_PYTHON: "3.12"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - lint
  - validate
  - build
  - deploy
  - build-sonar
  - sonarqube-vulnerability-report

# Install dependencies
.install_uv_template: &install_uv
  before_script:
    - uv --version
    - uv python install 3.12
    - uv sync --dev --python 3.12

# Docker login to NVIDIA Container Registry
.docker_login_template: &docker_login
  before_script:
    - docker --version
    - echo "$NGC_API_KEY" | docker login nvcr.io -u '$oauthtoken' --password-stdin

client-lint:
  stage: lint
  tags:
    - shell
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - >
      docker run --rm
      -v "$CI_PROJECT_DIR/client:/work"
      -w /work
      node:20-slim
      bash -c "npm ci && npm run lint"

format-check:
  stage: lint
  tags:
    - shell
  <<: *install_uv
  script:
    - uv run ruff format --check .
  allow_failure: false

lint-check:
  stage: lint
  tags:
    - shell
  <<: *install_uv
  script:
    - uv run ruff check .
  allow_failure: false

skills-validate:
  stage: validate
  tags:
    - shell
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - mkdir -p skills-report
    - >
      docker run --rm
      --user "$(id -u):$(id -g)"
      -v "$CI_PROJECT_DIR:/work"
      -w /work
      python:3.12-slim
      bash -lc "python -m venv /tmp/nv-base-venv &&
      . /tmp/nv-base-venv/bin/activate &&
      pip install nv-base -i https://urm.nvidia.com/artifactory/api/pypi/nv-shared-pypi/simple &&
      nv-base validate .agents --no-llm --no-dedup --checks schema,pii,code-integrity,unicode,quality,lint -r cli json html -o /work/skills-report/"
  artifacts:
    when: always
    paths:
      - skills-report/
    expire_in: 30 days

build-app:
  stage: build
  tags:
    - shell
  <<: *docker_login
  variables:
    IMAGE_NAME: nemotron-voice-agent/all-examples
    IMAGE_TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest -f docker/Dockerfile .

deploy:
  stage: deploy
  tags:
    - nemotron-voice-agent-pipeline
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  before_script:
    - echo "NVIDIA_API_KEY=${NGC_API_KEY}" > .env
    - echo "PIPELINE_APP_PORT=7860" >> .env
  script:
    - docker compose --profile cascaded-generic build
    - docker compose --profile cascaded-generic up -d --remove-orphans
    - echo "Generic Cascaded deployed at https://$(hostname):7860/"
  after_script:
    - rm -f .env

build-sonar:
  stage: build-sonar
  tags:
    - shell

  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/

  script:
    - docker run --rm -v "$CI_PROJECT_DIR:/usr/src" -v "${SONAR_USER_HOME}:/root/.sonar" -w /usr/src -e SONAR_HOST_URL="${SONAR_HOST_URL}" -e SONAR_TOKEN="${SONAR_TOKEN}" sonarsource/sonar-scanner-cli:11 sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'

sonarqube-vulnerability-report:
  stage: sonarqube-vulnerability-report
  tags:
    - shell
  script:
    - 'curl -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/issues/gitlab_sast_export?projectKey=SW-Cloud_NEMOTRON-VOICE-AGENT_NEMOTRON-VOICE-AGENT_nemotron-voice-agent&branch=${CI_COMMIT_BRANCH}&pullRequest=${CI_MERGE_REQUEST_IID}" -o gl-sast-sonar-report.json'
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'
  artifacts:
    expire_in: 1 day
    reports:
      sast: gl-sast-sonar-report.json
