name: nemotron-voice-agent

# Each example owns a self-contained compose file. The default all-examples
# profile starts one selector-capable UI/backend that can switch between
# registered examples from the UI.
#
#   Default selector:
#     --profile all-examples          All registered examples via UI selector (cloud/NVCF)
#
#   Cascaded / Generic standalone:
#     --profile generic              cloud endpoints (NVCF), no local sidecars
#     --profile generic-jetson       on-device Nemotron vLLM + Riva
#     --profile generic-dgxspark     on-device Nemotron vLLM + NIM ASR/TTS
#     --profile generic-workstation  NIM ASR/TTS + NIM LLM
#
#   Cascaded / Agentic Airline standalone:
#     --profile agentic-airline      Agentic Airline pipeline
#     --profile agentic-airline-workstation  Agentic Airline pipeline + local NIM ASR/TTS/LLM
#
#   Tracing (opt-in, combine with any profile above):
#     --profile tracing              Phoenix OTel collector

include:
  - path: src/cascaded/shared/docker-compose.yml
  - path: src/cascaded/generic/docker-compose.yml
  - path: src/cascaded/agentic_airline/docker-compose.yml

x-all-examples: &all-examples
  build:
    context: .
    dockerfile: Dockerfile
  image: nemotron-voice-agent:latest
  cpuset: ${PIPECAT_CPUSET:-}
  command: ["uv", "run", "python", "src/server.py", "--host", "0.0.0.0", "--all-examples"]
  ports:
    - "${PIPELINE_APP_PORT:-7860}:7860"
  env_file:
    - .env
  environment:
    APP_RUNTIME: container
    DEPLOYMENT_PLATFORM: ""
    DEFAULT_LLM: ${DEFAULT_LLM:-}
    DEFAULT_ASR: ${DEFAULT_ASR:-}
    DEFAULT_TTS: ${DEFAULT_TTS:-}
    BOOKING_API_URL: "http://booking-server:8001"
  volumes:
    - ./prompt.yaml:/app/prompt.yaml:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD-SHELL", "curl -fk https://localhost:7860/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  all-examples:
    <<: *all-examples
    profiles: ["all-examples"]

  # OpenTelemetry trace collector & UI (opt-in via ENABLE_TRACING).
  phoenix:
    profiles: ["tracing"]
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # TURN server for remote WebRTC clients (opt-in).
  coturn:
    profiles: ["turn"]
    image: instrumentisto/coturn:4
    network_mode: host
    command:
      - "-n"
      - "--log-file=stdout"
      - "--listening-port=3478"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--realm=voiceagent"
      - "--lt-cred-mech"
      - "--user=${TURN_USERNAME:-admin}:${TURN_PASSWORD:-admin}"
      - "--no-multicast-peers"
      - "--no-cli"
      - "--fingerprint"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
