name: nemotron-voice-agent

# Compose deployments are recipe-based. Every profile is a complete,
# self-contained deployment recipe so users never have to AND two
# profiles together.
#
#   <family>/<example>                  cloud-only deployment
#   <family>/<example>/<hardware>       on-prem deployment with the
#                                        right LLM + ASR + TTS sidecars
#
# Cloud-only and recipe profiles map 1:1 to the registry example key
# (``<family>/<example>``), so the active example is unambiguous from
# the profile name alone.
#
# Selector modes (``cascaded/all``, ``speech-to-speech/all``, ``all``)
# remain host-native only — they have no compose profile.
#
# Cloud-only invocations:
#   docker compose --profile cascaded/generic up
#   docker compose --profile cascaded/agentic-airline up
#   docker compose --profile cascaded/omni-assistant up
#   docker compose --profile cascaded/omni-assistant-subagents up
#   docker compose --profile speech-to-speech/generic up
#
# On-prem recipes:
#   docker compose --profile cascaded/generic/workstation up
#   docker compose --profile cascaded/generic/dgxspark up
#   docker compose --profile cascaded/generic/jetson up
#   docker compose --profile cascaded/agentic-airline/workstation up
#   docker compose --profile cascaded/omni-assistant/workstation up
#   docker compose --profile cascaded/omni-assistant/dgxspark up
#   docker compose --profile cascaded/omni-assistant-subagents/dgxspark up
#
# (Omni examples do not support Jetson today: the 30B Omni NVFP4 model
# does not fit on Orin-class hardware. Add jetson recipes once a smaller
# Omni variant lands.)
#
# Observability profiles compose orthogonally with any recipe:
#   docker compose --profile <recipe> --profile tracing up   # Phoenix OTel
#   docker compose --profile <recipe> --profile turn up      # coturn TURN
#
# Each app service sets ``EXAMPLE_SELECTION`` via a substitution default
# so the container always runs the matching example. The shell env var
# is treated as an advanced override (and is deliberately omitted from
# ``.env.example``).

include:
  - path: src/cascaded/shared/docker-compose.yml
  - path: src/cascaded/agentic_airline/docker-compose.yml

x-app: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  image: nemotron-voice-agent:latest
  cpuset: ${PIPECAT_CPUSET:-}
  command: ["uv", "run", "python", "src/server.py", "--host", "0.0.0.0"]
  ports:
    - "${PIPELINE_APP_PORT:-7860}:7860"
  env_file:
    - .env
  volumes:
    - ./src:/app/src:ro
    - ./examples_registry.yaml:/app/examples_registry.yaml:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD-SHELL", "curl -fk $$(test \"$$(printf %s \"$${PIPELINE_TLS:-true}\" | tr '[:upper:]' '[:lower:]')\" = true && echo https || echo http)://localhost:7860/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  cascaded-generic:
    <<: *app-base
    profiles:
      - cascaded/generic
      - cascaded/generic/workstation
      - cascaded/generic/dgxspark
      - cascaded/generic/jetson
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-cascaded/generic}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  cascaded-agentic-airline:
    <<: *app-base
    profiles:
      - cascaded/agentic-airline
      - cascaded/agentic-airline/workstation
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-cascaded/agentic-airline}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  cascaded-omni-assistant:
    <<: *app-base
    profiles:
      - cascaded/omni-assistant
      - cascaded/omni-assistant/workstation
      - cascaded/omni-assistant/dgxspark
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-cascaded/omni-assistant}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  cascaded-omni-assistant-subagents:
    <<: *app-base
    profiles:
      - cascaded/omni-assistant-subagents
      - cascaded/omni-assistant-subagents/dgxspark
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-cascaded/omni-assistant-subagents}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  speech-to-speech-generic:
    <<: *app-base
    profiles:
      - speech-to-speech/generic
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-speech-to-speech/generic}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  # OpenTelemetry trace collector & UI (opt-in via ENABLE_TRACING).
  phoenix:
    profiles: ["tracing"]
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # TURN server for remote WebRTC clients (opt-in).
  coturn:
    profiles: ["turn"]
    image: instrumentisto/coturn:4
    network_mode: host
    command:
      - "-n"
      - "--log-file=stdout"
      - "--listening-port=3478"
      - "--min-port=49160"
      - "--max-port=49200"
      - "--realm=voiceagent"
      - "--lt-cred-mech"
      - "--user=${TURN_USERNAME:-admin}:${TURN_PASSWORD:-admin}"
      - "--no-multicast-peers"
      - "--no-cli"
      - "--fingerprint"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
