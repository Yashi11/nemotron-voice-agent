name: nemotron-voice-agent

# Compose deployments are recipe-based. Every profile is a complete,
# self-contained deployment recipe so users never have to AND two
# profiles together.
#
#   <family>                   cloud-only models
#   <family>/<hardware>        on-prem models with local sidecars
#
# Families:
#   cascaded-generic          Cascaded ASR + LLM + TTS Pipeline (Generic Assistant)
#   cascaded-multilingual     Cascaded Multilingual ASR + LLM + TTS Pipeline (Multilingual Assistant)
#   cascaded-omni             Cascaded Omni LLM + TTS Pipeline (Omni Assistant + Omni Assistant Subagents)
#   speech-to-speech         Full Duplex Speech-to-Speech model (Nemotron VoiceChat)
#
# Hardware targets:
#   workstation               Single GPU with 80+ GB VRAM or modify to support multiple GPUs
#   dgx-spark                 DGX Spark with 128 GB unified memory
#   jetson-thor               Jetson Thor with 128 GB unified memory
#
# Cloud-only recipes:
#   docker compose --profile cascaded-generic up
#   docker compose --profile cascaded-multilingual up
#   docker compose --profile cascaded-omni up
#   docker compose --profile speech-to-speech up
#
# On-prem recipes:
#   docker compose --profile cascaded-generic/workstation up
#   docker compose --profile cascaded-generic/dgx-spark up
#   docker compose --profile cascaded-generic/jetson-thor up
#   docker compose --profile cascaded-multilingual/workstation up
#   docker compose --profile cascaded-multilingual/dgx-spark up
#   docker compose --profile cascaded-omni/workstation up
#   docker compose --profile cascaded-omni/dgx-spark up
#
# Observability profiles compose orthogonally with any recipe:
#   docker compose --profile <recipe> --profile tracing up   # Phoenix OTel
#   docker compose --profile <recipe> --profile turn up      # coturn TURN

include:
  - path: docker/docker-compose.nemotron3-nano.yaml
  - path: docker/docker-compose.nemotron3-super.yaml
  - path: docker/docker-compose.nemotron-asr.yaml
  - path: docker/docker-compose.parakeet-asr.yaml
  - path: docker/docker-compose.magpie-tts.yaml
  - path: docker/docker-compose.chatterbox-tts.yaml
  - path: docker/docker-compose.nemotron3-omni.yaml
  - path: docker/docker-compose.speech-jetson.yaml
  - path: docker/docker-compose.coturn.yaml
  - path: docker/docker-compose.phoenix.yaml

x-app: &app-base
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: nemotron-voice-agent:latest
  cpuset: ${PIPECAT_CPUSET:-}
  command: ["uv", "run", "python", "src/server.py", "--host", "0.0.0.0"]
  ports:
    - "${PIPELINE_APP_PORT:-7860}:7860"
  env_file:
    - .env
  volumes:
    - ./src:/app/src:ro
    - ./examples_registry.yaml:/app/examples_registry.yaml:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD-SHELL", "curl -fk $$(test \"$$(printf %s \"$${PIPELINE_TLS:-true}\" | tr '[:upper:]' '[:lower:]')\" = true && echo https || echo http)://localhost:7860/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  cascaded-generic:
    <<: *app-base
    profiles:
      - cascaded-generic
      - cascaded-generic/workstation
      - cascaded-generic/dgx-spark
      - cascaded-generic/jetson-thor
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-cascaded-generic/all}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  cascaded-multilingual:
    <<: *app-base
    profiles:
      - cascaded-multilingual
      - cascaded-multilingual/workstation
      - cascaded-multilingual/dgx-spark
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-cascaded-multilingual/all}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  cascaded-omni:
    <<: *app-base
    profiles:
      - cascaded-omni
      - cascaded-omni/workstation
      - cascaded-omni/dgx-spark
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-cascaded-omni/all}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}

  speech-to-speech:
    <<: *app-base
    profiles:
      - speech-to-speech
    environment:
      APP_RUNTIME: container
      EXAMPLE_SELECTION: ${EXAMPLE_SELECTION:-speech-to-speech/all}
      TRANSPORT_SELECTION: ${TRANSPORT_SELECTION:-}
