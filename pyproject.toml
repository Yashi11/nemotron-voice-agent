[project]
name = "voice-agent-webrtc"
version = "0.1.0"
description = "Voice Agent WebRTC example"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "nvidia-pipecat",
    "uvicorn>=0.34.0",
    "python-dotenv>=1.0.1",
]

[tool.uv.sources]
nvidia-pipecat = { path = "./nvidia-pipecat", editable = true }
torch = { index = "pytorch" }


[[tool.uv.index]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[dependency-groups]
dev = [
    "ruff>=0.11.13",
]
