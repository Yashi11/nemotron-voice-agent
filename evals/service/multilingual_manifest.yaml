# Service-backed multilingual assistant scenarios. These require configured
# NVIDIA services and are intended for gated CI/CD or post-deploy validation.

bots_dir: ../../src
scenarios_dir: scenarios
concurrency: 1
base_port: 7950
runs_dir: ../../eval-runs
record: false
spawn: "{python} {bot} -t eval --port {port}"

suite:
  - bot: eval_bot.py
    runner_body: runner_bodies/multilingual_fixed_english.json
    scenarios:
      - multilingual_initial_greeting
      - multilingual_basic_english
      - multilingual_fixed_english_lock
      - multilingual_latency_smoke
  - bot: eval_bot.py
    runner_body: runner_bodies/multilingual_fixed_spanish.json
    scenarios:
      - multilingual_fixed_spanish
