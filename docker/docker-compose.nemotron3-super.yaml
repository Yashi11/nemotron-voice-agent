# Nemotron Super LLM Service.
services:
  nemotron-3-super:
    profiles:
      - nemotron-3-super
    image: nvcr.io/nim/nvidia/nemotron-3-super-120b-a12b:2.0.5
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=8000
    ports:
      - "18001:8000"
    volumes:
      - llm_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health/ready\").read()' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 1800s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1', '2']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
