x-nemotron-asr: &nemotron-asr
  image: nvcr.io/nim/nvidia/nemotron-asr-streaming:1.2.0
  user: "0:0"
  ports:
    - "50152:50052"
    - "9001:9001"
  volumes:
    - asr_cache:/opt/nim/.cache
  ulimits:
    nofile: 2048
  healthcheck:
    test: ["CMD-SHELL", "python3 -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:9001/v1/health/ready\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ready\" or data.get(\"ready\") is True else 1)'"]
    interval: 30s
    timeout: 10s
    retries: 15
    start_period: 2400s
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ['0']
            capabilities: [gpu]
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

x-nemotron-asr-env: &nemotron-asr-env
  NGC_API_KEY: ${NVIDIA_API_KEY}
  NIM_HTTP_API_PORT: "9001"
  NIM_GRPC_API_PORT: "50052"

services:
  nemotron-asr-streaming-english:
    <<: *nemotron-asr
    profiles:
      - generic-assistant/workstation
      - generic-assistant/workstation-perf
      - frontend-backend-agent/workstation
    environment:
      <<: *nemotron-asr-env
      NIM_TAGS_SELECTOR: type=en-US,mode=str
    networks:
      default:
        aliases:
          - nemotron-asr-streaming-english

  nemotron-asr-streaming-multilingual:
    <<: *nemotron-asr
    profiles:
      - nemotron-asr-streaming-multilingual/workstation
      - multilingual-assistant/workstation
    environment:
      <<: *nemotron-asr-env
      NIM_TAGS_SELECTOR: type=multi,mode=str

  nemotron-asr-streaming-multilingual-dgx-spark:
    <<: *nemotron-asr
    profiles:
      - nemotron-asr-streaming-multilingual/dgx-spark
      - multilingual-assistant/dgx-spark
    environment:
      <<: *nemotron-asr-env
      NIM_TAGS_SELECTOR: type=multi,mode=str,gpu=dgx_spark,batch_size=32
    networks:
      default:
        aliases:
          - nemotron-asr-streaming-multilingual

  nemotron-asr-streaming-english-dgx-spark:
    <<: *nemotron-asr
    profiles:
      - generic-assistant/dgx-spark
    environment:
      <<: *nemotron-asr-env
      NIM_TAGS_SELECTOR: mode=str,gpu=dgx_spark,batch_size=32
    networks:
      default:
        aliases:
          - nemotron-asr-streaming-english

volumes:
  asr_cache:
