services:
  tts-service:
    profiles:
      - generic-assistant/workstation
      - generic-assistant/dgx-spark
      - multilingual-assistant/workstation
      - multilingual-assistant/dgx-spark
      - omni-assistant/workstation
      - omni-assistant-subagents/workstation
      - omni-assistant/dgx-spark
      - omni-assistant-subagents/dgx-spark
      - thinker-talker/workstation
    image: nvcr.io/nvstaging/nim/magpie-tts-multilingual:1.9.0-53531670
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
      - NIM_TAGS_SELECTOR=${TTS_NIM_TAGS:-name=magpie-tts-multilingual,batch_size=8}
    ports:
      - "50151:50051"
      - "9000:9000"
    volumes:
      - tts_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:9000/v1/health/ready\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ready\" or data.get(\"ready\") is True else 1)'"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 3000s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  tts_cache:
