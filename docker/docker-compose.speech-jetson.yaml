# Riva speech on Jetson Thor. Both services share one base via a YAML anchor
# (anchors don't merge `profiles`, unlike compose `extends`, so each service is
# pinned to exactly one recipe):
#   nemotron-speech      -> generic-assistant/jetson-thor (ASR + TTS)
#   nemotron-speech-tts  -> omni-assistant/jetson-thor    (TTS only; Omni does
#                                                          its own ASR)
# Mutually exclusive profiles, so they reuse the same host port + model repo.

x-riva-speech: &riva-speech
  image: gitlab-master.nvidia.com:5005/dl/riva/riva-speech/riva:dev..ydharavath..magpie-v1-zeroshot-PR.53617348-l4t-aarch64
  runtime: nvidia
  ipc: host
  cpuset: ${RIVA_CPUSET:-}
  environment:
    - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
    - CUDA_MPS_LOG_DIRECTORY=/tmp/nvidia-log
    - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${RIVA_MPS_THREAD_PCT:-100}
  volumes:
    - ${RIVA_MODEL_LOC:-/tmp/riva-model-repo-not-configured}:/data
    - /tmp/nvidia-mps:/tmp/nvidia-mps
    - /tmp/nvidia-log:/tmp/nvidia-log
  ports:
    - "50051:50051"
  ulimits:
    memlock: -1
  healthcheck:
    test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
    interval: 10s
    timeout: 5s
    retries: 30
    start_period: 120s
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  # Full Riva (ASR + TTS) for the generic cascaded assistant.
  nemotron-speech:
    <<: *riva-speech
    profiles:
      - generic-assistant/jetson-thor
    container_name: nemotron-speech
    command:
      - start-riva
      - --riva-uri=0.0.0.0:50051
      - --asr_service=true
      - --tts_service=true
      - --nlp_service=false

  # TTS-only Riva for the Omni assistant (Omni handles ASR itself).
  nemotron-speech-tts:
    <<: *riva-speech
    profiles:
      - omni-assistant/jetson-thor
    container_name: nemotron-speech-tts
    command:
      - start-riva
      - --riva-uri=0.0.0.0:50051
      - --asr_service=false
      - --tts_service=true
      - --nlp_service=false
