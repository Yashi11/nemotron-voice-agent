# Parakeet ASR CTC and RNNT multilingual services

x-parakeet-asr-env: &parakeet-asr-env
  NGC_API_KEY: ${NVIDIA_API_KEY}
  NIM_HTTP_API_PORT: "9001"
  NIM_GRPC_API_PORT: "50052"

x-parakeet-asr: &parakeet-asr-base
  user: "0:0"
  environment:
    <<: *parakeet-asr-env
  ports:
    - "50152:50052"
    - "9001:9001"
  volumes:
    - asr_cache:/opt/nim/.cache
  ulimits:
    nofile: 2048
  healthcheck:
    test: ["CMD-SHELL", "python3 -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:9001/v1/health/ready\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ready\" or data.get(\"ready\") is True else 1)'"]
    interval: 30s
    timeout: 10s
    retries: 15
    start_period: 2400s
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ['0']
            capabilities: [gpu]
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  parakeet-ctc-asr:
    <<: *parakeet-asr-base
    environment:
      <<: *parakeet-asr-env
      NIM_TAGS_SELECTOR: mode=str,vad=silero
    profiles:
      - parakeet-ctc-asr
    image: nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us:1.5.0

  parakeet-rnnt-asr:
    <<: *parakeet-asr-base
    environment:
      <<: *parakeet-asr-env
      NIM_TAGS_SELECTOR: mode=str,vad=silero,type=default
    profiles:
      - parakeet-rnnt-asr
      - multilingual-assistant/workstation
      - multilingual-assistant/dgx-spark
    image: nvcr.io/nim/nvidia/parakeet-1-1b-rnnt-multilingual:1.5.0

volumes:
  asr_cache:
