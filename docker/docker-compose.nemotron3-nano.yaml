# Shared base for the self-hosted vLLM Nemotron-3-Nano (NVFP4) service. The
# only per-platform difference is the NVFP4 MoE kernel backend (--moe-backend),
# so dgx-spark and jetson-thor are split into two profile-scoped services below.
x-vllm-nano: &vllm-nano
  image: nvcr.io/nvidia/vllm:26.05.post1-py3
  pull_policy: if_not_present
  shm_size: 16GB
  env_file:
    - ../.env
  environment:
    - FLASHINFER_DISABLE_VERSION_CHECK=1
  ports:
    - "18000:8000"
  volumes:
    - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    - llm_cache:/root/.cache/vllm
  ulimits:
    nofile: 2048
  restart: unless-stopped
  entrypoint: ["/bin/bash", "-c"]
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
    interval: 30s
    timeout: 15s
    retries: 10
    start_period: 1200s
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ['0']
            capabilities: [gpu]
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  nvidia-llm:
    profiles:
      - generic-assistant/workstation
      - multilingual-assistant/workstation
      - thinker-talker/workstation
    image: nvcr.io/nim/nvidia/nemotron-3-nano:2.0.5
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=8000
      - NIM_TAGS_SELECTOR=precision=fp8,tp=1
      - NIM_KVCACHE_PERCENT=${NIM_KVCACHE_PERCENT:-0.6}
      - NIM_MAX_MODEL_LEN=32768
      - NIM_PASSTHROUGH_ARGS=--enable-auto-tool-choice --tool-call-parser qwen3_coder --reasoning-parser nemotron_v3 --max-num-seqs 256
    ports:
      - "18000:8000"
    volumes:
      - llm_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health/ready\").read()' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 1800s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # DGX Spark (sm_121): FlashInfer CUTLASS NVFP4 MoE kernel (vLLM default path).
  nvidia-llm-vllm:
    <<: *vllm-nano
    profiles:
      - generic-assistant/dgx-spark
      - multilingual-assistant/dgx-spark
    container_name: nvidia-llm-vllm
    command:
      - |
        vllm serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4 \
          --host 0.0.0.0 \
          --port 8000 \
          --max-model-len 4096 \
          --gpu-memory-utilization 0.35 \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser nemotron_v3 \
          --moe-backend flashinfer_cutlass \
          --async-scheduling \
          --kv-cache-dtype fp8

  # Jetson Thor (sm_110): Use the native vLLM CUTLASS kernel.
  nvidia-llm-vllm-jetson:
    <<: *vllm-nano
    profiles:
      - generic-assistant/jetson-thor
    container_name: nvidia-llm-vllm-jetson
    cpuset: ${VLLM_CPUSET:-}
    # Thor shares one GPU between vLLM and Speech Models (Riva) via CUDA MPS (see scripts/start-mps.sh).
    environment:
      - FLASHINFER_DISABLE_VERSION_CHECK=1
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_LOG_DIRECTORY=/tmp/nvidia-log
      - CUDA_MPS_ACTIVE_THREAD_PERCENTAGE=${VLLM_MPS_THREAD_PCT:-100}
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - llm_cache:/root/.cache/vllm
      - /tmp/nvidia-mps:/tmp/nvidia-mps
      - /tmp/nvidia-log:/tmp/nvidia-log
    networks:
      default:
        aliases:
          - nvidia-llm-vllm
    command:
      - |
        vllm serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4 \
          --host 0.0.0.0 \
          --port 8000 \
          --max-model-len 4096 \
          --gpu-memory-utilization 0.35 \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser nemotron_v3 \
          --moe-backend cutlass \
          --async-scheduling \
          --kv-cache-dtype fp8

volumes:
  llm_cache:
