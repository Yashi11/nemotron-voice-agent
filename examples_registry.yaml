# Single source of truth for what the UI selector exposes:
#   all            → every registered example (selectable)
#   <example>      → lock to one example (no switching)
#
# The first example listed (YAML insertion order) within the visible set
# becomes the initial default selection.
#
# The ``EXAMPLE_SELECTION`` environment variable overrides this value at
# runtime so the same YAML can drive multiple compose profiles.
selection: all

# Which transport(s) the UI exposes:
#   all        → WebRTC and WebSocket
#   webrtc     → WebRTC only
#   websocket  → WebSocket only
#
# Override at runtime via the ``TRANSPORT_SELECTION`` environment variable.
transports: all

examples:
  generic-assistant:
    label: Generic Assistant
    slots: [llm, asr, tts]
    defaults:
      prompt: [generic_assistant]
      llm: [nemotron-nano]
      asr: [nemotron-asr-streaming-english]
      tts: [magpie-tts]
    bot: examples.generic.pipeline:bot

  multilingual-assistant:
    label: Multilingual Assistant
    slots: [llm, asr, tts]
    capabilities: [session_languages]
    agent_prompt_keys:
      - fixed_session_language_addon
      - auto_detect_language_addon
    defaults:
      default_session_language: es-US
      prompt: [multilingual_voice_assistant]
      llm: [nemotron-super]
      asr: [parakeet-rnnt]
      tts: [magpie-tts]
    bot: examples.multilingual.pipeline:bot

  omni-assistant:
    label: Nemotron Omni Assistant
    slots: [llm, tts]
    defaults:
      prompt: [generic_omni_assistant]
      llm: [nemotron-omni-nvfp4]
      tts: [magpie-tts]
    bot: examples.omni_assistant.pipeline:bot

  omni-assistant-subagents:
    label: Nemotron Omni Assistant Subagents
    slots: [llm, tts]
    capabilities: [attachments, webcam]
    defaults:
      prompt: [generic_omni_assistant]
      llm: [nemotron-omni-nvfp4]
      tts: [magpie-tts]
    bot: examples.omni_assistant_subagents.pipeline:bot

  frontend-backend-agent:
    label: Frontend Backend Agent
    slots: [llm, thinker-llm, booking-server, asr, tts]
    defaults:
      prompt: [talker]
      llm: [nemotron-nano]
      thinker-llm: [nemotron-nano]
      booking-server: [default]
      asr: [nemotron-asr-streaming-english]
      tts: [magpie-tts]
    bot: examples.frontend_backend_agent.pipeline:bot
