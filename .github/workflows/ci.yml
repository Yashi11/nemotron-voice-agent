#
# Lightweight CI: Python lint/format (ruff), Python unit tests (pytest), and
# client lint + build (eslint, tsc, vite). No deployment and no GPU are required.

name: Nemotron Voice Agent CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Ruff lint
        run: uvx ruff@0.15.6 check .

      - name: Ruff format check
        run: uvx ruff@0.15.6 format --check .

  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ -v

  client-lint-build:
    name: Client lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Lint client
        run: npm --prefix client run lint

      - name: Build client
        run: npm --prefix client run build
